services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - POLYGON_USE_SOLUTION=${POLYGON_USE_SOLUTION:-0}
      - OPENLINEAGE_NAMESPACE=${OPENLINEAGE_NAMESPACE:-insurance-polygon}
      - MARQUEZ_API_URL=${MARQUEZ_API_URL:-http://marquez-api:5000}
      - UC_SERVER_URL=${UC_SERVER_URL:-http://unity-catalog:8080}
      - UC_TOKEN=${UC_TOKEN:-}
    command:
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --NotebookApp.token=''

  marquez-db:
    image: postgres:15
    profiles: [lineage]
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      POSTGRES_DB: marquez
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 5s
      timeout: 5s
      retries: 10

  marquez-api:
    image: marquezproject/marquez:0.51.1
    profiles: [lineage]
    ports:
      - "5000:5000"
    environment:
      MARQUEZ_DB_HOST: marquez-db
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB_NAME: marquez
      MARQUEZ_DB_USER: marquez
      MARQUEZ_DB_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      MARQUEZ_PORT: 5000
    depends_on:
      marquez-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/namespaces"]
      interval: 5s
      timeout: 5s
      retries: 20

  marquez-web:
    image: marquezproject/marquez-web:0.51.1
    profiles: [lineage]
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_API_URL: http://marquez-api:5000
    depends_on:
      marquez-api:
        condition: service_healthy

  unity-catalog:
    image: unitycatalog/unitycatalog:main-2f2e32d
    profiles: [unity]
    ports:
      - "8080:8080"

volumes:
  marquez-db-data:
